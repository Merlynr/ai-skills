# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
# Linux 配置模板 — 复制为 config.yaml 后使用：
#   cp config.linux.yaml config.yaml
sources:
  skills: ~/.config/skillshare/skills
  agents: ~/.config/skillshare/agents
mode: merge
target_naming: standard
targets:
  agents:
    skills:
      path: ~/.agents/skills
      include: &facade_skills
        - "merlynr-dev-stack"
        - "merlynr-dev"
        - "uzi-analysis-stack"
        - "gsd-ns-*"
        - "gsd-team"
        - "gsd-do"
        - "gsd-fast"
        - "gsd-quick"
        - "gsd-update"
        - "gsd-reapply-patches"
        - "gaoruan-*"
        - "stock-trade-*"
        - "skillshare"
        - "unified-learning-session"
        - "generate-daily-plan"
  codex:
    skills:
      path: ~/.codex/skills
  cursor:
    skills:
      path: ~/.cursor/skills
      mode: copy
      include: *facade_skills
  opencode:
    skills:
      path: ~/.config/opencode/skills
      include: *facade_skills
  claude:
    skills:
      path: ~/.claude/skills
      include: *facade_skills
  antigravity:
    skills:
      path: ~/.gemini/config/skills
      include: *facade_skills
ignore:
  - '**/.DS_Store'
  - '**/.git/**'
audit:
  block_threshold: CRITICAL
