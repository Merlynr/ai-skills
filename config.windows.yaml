# yaml-language-server: $schema=https://raw.githubusercontent.com/runkids/skillshare/main/schemas/config.schema.json
# Windows 配置模板 — 复制为 config.yaml 后使用：
#   .\setup-config.ps1
# 若用户名不同，请将路径中的 101202106068 改为你的用户名。
sources:
  skills: C:/Users/101202106068/AppData/Roaming/skillshare/skills
  agents: C:/Users/101202106068/AppData/Roaming/skillshare/agents
mode: merge
target_naming: standard
targets:
  agents:
    skills:
      path: C:/Users/101202106068/.agents/skills
      include: &facade_skills
        - "merlynr-dev-stack"
        - "gsd-ns-*"
        - "gsd-team"
        - "gsd-do"
        - "gsd-fast"
        - "gsd-quick"
        - "gsd-update"
        - "gsd-reapply-patches"
        - "gaoruan-*"
        - "stock-trade-*"
        - "skillshare"
        - "unified-learning-session"
        - "generate-daily-plan"
  codex:
    skills:
      path: C:/Users/101202106068/.codex/skills
  cursor:
    skills:
      path: C:/Users/101202106068/.cursor/skills
      mode: copy
      include: *facade_skills
  opencode:
    skills:
      path: C:/Users/101202106068/.config/opencode/skills
      include: *facade_skills
ignore:
  - '**/.DS_Store'
  - '**/.git/**'
audit:
  block_threshold: CRITICAL
